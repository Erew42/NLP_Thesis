site_name: NLP Thesis Documentation
site_description: Documentation for thesis_pkg SEC extraction, SEC-CCM linking, and analysis tooling.
site_url: ""
repo_url: ""

theme:
  name: material
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - toc.follow

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/index.md
    - Pipeline Maps:
      - Master Execution Index: architecture/00_master_index.md
      - Thesis Pipeline Architecture: architecture/FINAL_THESIS_PIPELINE.md
      - Full Pipeline Architecture: architecture/FULL_PIPELINE_ARCHITECTURE.md
    - Package Entry Points:
